# Fast PR gate: run the same checks the lefthook pre-commit hook runs, directly
# on the runner (no container). Seconds, not minutes — this is the gate.
# The devcontainer is validated separately in devcontainer.yml.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-test:
    name: check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Keep in sync with the project's developed-against Bun version
          # (also pinned in .devcontainer/Dockerfile).
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
