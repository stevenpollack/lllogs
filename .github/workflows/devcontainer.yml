# Builds the devcontainer and runs the test suite INSIDE it — validating the
# exact environment future subagents use (Dockerfile, Bun pin, gh feature,
# postCreate: bun install + Claude install + settings).
#
# Caching: main/manual runs build the image and push it to GHCR (push: always),
# warming a layer cache; PR runs pull it via cacheFrom and only build the delta
# + run the suite (push: never). This keeps the gate fast enough to be required.
#
# Second purpose is measurement: it times the in-container suite and the total
# build+postCreate+suite cost to the job summary, so we can judge whether to make
# this a required PR check. Caching only warms AFTER the first main build pushes
# the image — the PR that introduces this workflow still pays a cold build.
name: Devcontainer

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: devcontainer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push the prebuilt image to GHCR on main/manual runs

env:
  IMAGE: ghcr.io/${{ github.repository }}-devcontainer

jobs:
  suite:
    name: devcontainer suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Needed to pull the cache image and (on main/manual) push the rebuilt one.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # devcontainer.json wires secrets via `docker run --env-file`, which is a
      # HARD error if the file is missing. check/test need no real secrets, so
      # stub an empty file and tell post-create.sh to skip its secret preflight.
      - name: Stub .env (--env-file requires the file; skip the secret preflight)
        run: printf 'ANTHROPIC_API_KEY=\nGH_TOKEN=\nLLLOGS_SANDBOX_SKIP_SECRET_CHECK=1\n' > .devcontainer/.env

      - name: Record start (build + postCreate + suite)
        id: t0
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build devcontainer (cached) and run suite inside it
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE }}
          cacheFrom: ${{ env.IMAGE }}
          # main / manual runs push the freshly built image to warm the cache for
          # later PRs; PR runs only pull the cache and never push.
          push: ${{ github.event_name == 'pull_request' && 'never' || 'always' }}
          # Runs after the image is built and postCreateCommand has completed
          # (deps installed). Times each phase and writes seconds to a workspace
          # file the host reads back for the summary.
          runCmd: |
            set -euo pipefail
            cs=$(date +%s); bun run check; ce=$(date +%s)
            ts=$(date +%s); bun test;      te=$(date +%s)
            printf 'check_s=%s\ntest_s=%s\n' "$((ce - cs))" "$((te - ts))" > .ci-timing.env

      - name: Summarize timing
        if: always()
        run: |
          total=$(( $(date +%s) - ${{ steps.t0.outputs.epoch }} ))
          {
            echo "## Devcontainer suite timing"
            echo ""
            echo "| Phase | Seconds |"
            echo "| --- | ---: |"
            if [ -f .ci-timing.env ]; then
              . ./.ci-timing.env
              echo "| bun run check (in container) | ${check_s} |"
              echo "| bun test (in container) | ${test_s} |"
            else
              echo "| in-container suite | did not complete |"
            fi
            echo "| Total (build + postCreate + suite) | ${total} |"
          } >> "$GITHUB_STEP_SUMMARY"
