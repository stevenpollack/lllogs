<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>clogdy</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          13px/1.4 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        color: #ddd;
        background: #111;
      }
      #layout {
        display: flex;
        height: 100vh;
        flex-direction: column;
      }
      #tiles {
        display: flex;
        gap: 12px;
        align-items: stretch;
        padding: 6px 10px;
        background: #161616;
        border-bottom: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .tile {
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 6px 14px;
        min-width: 100px;
      }
      .tile-label {
        font-size: 10px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 2px;
      }
      .tile-value {
        font-size: 16px;
        color: #ccc;
        font-weight: bold;
      }
      #body-row {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      #facets {
        width: 220px;
        overflow-y: auto;
        border-right: 1px solid #333;
        padding: 8px;
        flex-shrink: 0;
      }
      #facets h3 {
        margin: 12px 0 4px;
        font-size: 11px;
        text-transform: uppercase;
        color: #888;
      }
      #facets h3.facet-head {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        user-select: none;
      }
      #facets h3.facet-head:hover {
        color: #bbb;
      }
      #facets .facet-caret {
        color: #666;
        width: 9px;
        display: inline-block;
      }
      #facets .facet-dim {
        flex: 1;
      }
      #facets .facet-n {
        color: #555;
        font-weight: normal;
      }
      .facet {
        cursor: pointer;
        padding: 1px 4px;
        border-radius: 3px;
        display: flex;
        justify-content: space-between;
      }
      .facet:hover {
        background: #222;
      }
      .facet.active {
        background: #2a4;
        color: #000;
      }
      .facet .count {
        color: #888;
      }
      .facet.active .count {
        color: #000;
      }
      main {
        flex: 1;
        overflow: auto;
        padding: 8px;
      }
      #bar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      #q {
        flex: 1;
        min-width: 200px;
        padding: 4px 8px;
        background: #222;
        border: 1px solid #444;
        color: #ddd;
      }
      .chip {
        background: #333;
        padding: 2px 8px;
        border-radius: 10px;
        cursor: pointer;
      }
      .chip:hover {
        background: #500;
      }
      #live-btn {
        padding: 3px 10px;
        background: #1a2a1a;
        border: 1px solid #396;
        color: #8c8;
        cursor: pointer;
        border-radius: 3px;
        font: inherit;
      }
      #live-btn.active {
        background: #1e3a1e;
        border-color: #4c4;
        color: #4f4;
      }
      #q-help {
        color: #777;
        cursor: help;
        user-select: none;
        margin-left: -2px;
      }
      #q-help:hover {
        color: #bbb;
      }
      .col-menu {
        position: relative;
        display: inline-block;
      }
      #col-menu-btn {
        padding: 3px 10px;
        background: #222;
        border: 1px solid #444;
        color: #ddd;
        cursor: pointer;
        border-radius: 3px;
        font: inherit;
      }
      #col-menu-btn:hover {
        background: #2a2a2a;
      }
      #col-menu-list li label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      #col-menu-list input {
        cursor: pointer;
      }
      #col-menu-list input:disabled {
        cursor: not-allowed;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      /* Fixed layout + explicit column widths so wide COMMAND/RESULT/TEXT content
         can't collapse the short columns to ~0 width (which made headers wrap one
         char per line). Per-cell content wraps within its column and is clipped. */
      #events {
        table-layout: fixed;
      }
      /* Clamp tall cell content in both fixed-layout grids so a long value (e.g.
         SELECT * returning `raw`/`text`) can't blow a row to thousands of px and
         throw off the virtualizer's row-height estimate. */
      #events td > *,
      #query-result td > * {
        max-height: 8.5em;
        overflow: hidden;
        display: block;
      }
      th,
      td {
        text-align: left;
        padding: 3px 6px;
        border-bottom: 1px solid #222;
        vertical-align: top;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      th {
        position: sticky;
        top: 0;
        background: #181818;
        color: #888;
        font-size: 11px;
      }
      .error {
        color: #f55;
      }
      /* Column widths come from react-table sizing (inline on <col>); drag the
         right edge of a header to resize, double-click to reset. (Header cells are
         already position:sticky above, which anchors the absolute .resizer.) */
      #query-result {
        table-layout: fixed;
      }
      .resizer {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: 6px;
        cursor: col-resize;
        user-select: none;
        touch-action: none;
      }
      .resizer:hover,
      .resizer.is-resizing {
        background: #4c4;
      }
      /* Click a sortable column label to sort the loaded rows; the resize handle
         (right edge) stops propagation so dragging never triggers a sort. */
      th .th-label {
        display: inline-block;
        max-width: calc(100% - 8px);
      }
      th .th-label.sortable {
        cursor: pointer;
      }
      th .th-label.sortable:hover {
        color: #ccc;
      }
      /* Drag a header label onto another to re-arrange columns (events grid only).
         More specific than .sortable so the grab cursor wins on a sortable label;
         .drag-over marks the current drop target. */
      th .th-label[draggable="true"] {
        cursor: grab;
      }
      th .th-label[draggable="true"]:active {
        cursor: grabbing;
      }
      th .th-label.drag-over {
        background: #2a4;
        color: #000;
        border-radius: 2px;
        opacity: 0.85;
      }
      #more {
        margin: 8px 0;
        padding: 6px 12px;
        cursor: pointer;
        background: #234;
        border: 1px solid #456;
        color: #ddd;
      }
      #tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
      }
      .tab {
        padding: 4px 14px;
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        color: #888;
        cursor: pointer;
        border-radius: 3px;
        font: inherit;
      }
      .tab:hover {
        background: #252525;
        color: #bbb;
      }
      .tab.active {
        background: #1e3a1e;
        border-color: #4c4;
        color: #4f4;
      }
      #analytics {
        padding: 4px;
      }
      #analytics h3 {
        margin: 18px 0 6px;
        font-size: 12px;
        text-transform: uppercase;
        color: #888;
        letter-spacing: 0.04em;
      }
      #analytics h3:first-child {
        margin-top: 0;
      }
      #analytics .no-data {
        color: #666;
        font-style: italic;
      }
      .bar-list {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .bar-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bar-label {
        width: 160px;
        flex-shrink: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .bar-track {
        flex: 1;
        height: 14px;
        background: #1e1e1e;
        border-radius: 2px;
        min-width: 60px;
      }
      .bar-fill {
        height: 100%;
        background: #2a4;
        border-radius: 2px;
      }
      .bar-value {
        width: 60px;
        flex-shrink: 0;
        text-align: right;
        color: #aaa;
      }
      .gauge {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .gauge-track {
        width: 240px;
        height: 16px;
        background: #1e1e1e;
        border-radius: 3px;
      }
      .gauge-fill {
        height: 100%;
        border-radius: 3px;
      }
      .gauge-text {
        font-weight: bold;
        color: #ccc;
      }
      #analytics .gauge-number {
        margin-top: 4px;
        color: #888;
      }
      table.stats-table {
        width: auto;
        margin-top: 2px;
      }
      table.stats-table th,
      table.stats-table td {
        padding: 2px 14px 2px 0;
        border-bottom: 1px solid #222;
      }
      table.stats-table td {
        color: #ccc;
      }
      svg.spark rect:hover {
        fill: #4f6;
      }
      .cmd-table {
        width: auto;
        border-collapse: collapse;
      }
      .cmd-table td {
        padding: 1px 4px;
        border-bottom: 1px solid #222;
      }
      .rline {
        white-space: pre-wrap;
      }
      .rline.add {
        color: #4ade80;
      }
      .rline.del {
        color: #f87171;
      }
      .rline.head {
        color: #9ca3af;
      }
      .rline.err {
        color: #f87171;
      }
      #events tbody tr {
        cursor: pointer;
      }
      #drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: 46%;
        max-width: 760px;
        height: 100vh;
        background: #161616;
        border-left: 1px solid #333;
        padding: 14px;
        overflow: auto;
        z-index: 50;
        box-shadow: -4px 0 16px rgba(0, 0, 0, 0.5);
      }
      #drawer pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #0d0d0d;
        padding: 8px;
        border: 1px solid #222;
      }
      #drawer h4 {
        margin: 10px 0 4px;
        color: #888;
        font-size: 11px;
        text-transform: uppercase;
      }
      #drawer .corr-link {
        cursor: pointer;
        color: #6cf;
      }
      #drawer .close {
        float: right;
        cursor: pointer;
        color: #aaa;
      }
      /* Full-row scalar metadata: a tight 2-col label/value grid near the top. */
      #drawer .drawer-meta {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 2px 10px;
        margin: 6px 0 12px;
      }
      #drawer .drawer-meta dt {
        color: #888;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.04em;
        align-self: baseline;
      }
      #drawer .drawer-meta dd {
        margin: 0;
        color: #ccc;
        word-break: break-word;
        white-space: pre-wrap;
      }
      #drawer pre.drawer-code {
        margin: 4px 0;
      }
      /* react-diff-view — inlined from node_modules/react-diff-view/style/index.css,
         dark-tuned and scoped to #drawer (the only place a <Diff> renders). The
         library's own *.css is NOT imported in JS: Bun.build would emit an
         unlinked stylesheet, so the rules live here. */
      #drawer .diff {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        color: #ddd;
        background: #0d0d0d;
        border: 1px solid #222;
        margin: 4px 0;
        font:
          12px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      #drawer .diff td {
        padding: 0;
        vertical-align: top;
      }
      #drawer .diff-line {
        line-height: 1.5;
      }
      #drawer .diff-gutter {
        padding: 0 1ch;
        text-align: right;
        user-select: none;
        color: #666;
        cursor: default;
      }
      #drawer .diff-gutter > a {
        color: inherit;
        display: block;
      }
      #drawer .diff-gutter-col {
        width: 6ch;
      }
      #drawer .diff-code {
        padding: 0 0 0 0.6em;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #drawer .diff-code-edit {
        color: inherit;
      }
      #drawer .diff-gutter-insert {
        background: #13361d;
        color: #86efac;
      }
      #drawer .diff-code-insert {
        background: #0e2a16;
      }
      #drawer .diff-code-insert .diff-code-edit {
        background: #1f6b34;
        color: #dcffe4;
      }
      #drawer .diff-gutter-delete {
        background: #3a1618;
        color: #fca5a5;
      }
      #drawer .diff-code-delete {
        background: #2a0f11;
      }
      #drawer .diff-code-delete .diff-code-edit {
        background: #7a2327;
        color: #ffe1e1;
      }
      /* SQL editor toolbar + Examples/Columns dropdowns */
      #sql-editor {
        margin-bottom: 8px;
      }
      .sql-toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 4px;
      }
      .sql-menu {
        position: relative;
        display: inline-block;
      }
      .sql-toolbar button {
        font: inherit;
        padding: 3px 10px;
        background: #222;
        border: 1px solid #444;
        color: #ddd;
        cursor: pointer;
        border-radius: 3px;
      }
      .sql-toolbar button:hover {
        background: #2a2a2a;
      }
      #sql-run {
        background: #1e3a1e;
        border-color: #4c4;
        color: #4f4;
      }
      #sql-run:hover {
        background: #245024;
      }
      .sql-hint {
        color: #666;
        font-size: 11px;
        margin-left: auto;
      }
      .sql-dropdown {
        position: absolute;
        z-index: 60;
        top: 100%;
        left: 0;
        margin: 2px 0 0;
        padding: 4px;
        list-style: none;
        background: #1b1b1b;
        border: 1px solid #333;
        border-radius: 4px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
        max-height: 340px;
        overflow: auto;
      }
      .sql-dropdown li {
        padding: 3px 8px;
        border-radius: 3px;
        cursor: pointer;
        white-space: nowrap;
      }
      .sql-dropdown li:hover {
        background: #263;
      }
      #sql-columns-list {
        min-width: 560px;
        max-width: 80vw;
      }
      /* Prefixed with `.sql-dropdown li` so these beat `.sql-dropdown li[:hover]`
         on specificity — otherwise the non-interactive hint row gets the pointer
         cursor + green hover of a real menu item. */
      .sql-dropdown li.sql-columns-hint {
        color: #888;
        font-size: 11px;
        cursor: default;
      }
      .sql-dropdown li.sql-columns-hint:hover {
        background: none;
      }
      .sql-columns-hint code {
        color: #6cf;
      }
      .sql-column {
        display: grid;
        grid-template-columns: 130px 52px minmax(0, 1fr);
        gap: 8px;
        align-items: baseline;
        white-space: normal;
      }
      .sql-col-name {
        color: #6cf;
      }
      .sql-col-type {
        color: #888;
        font-size: 11px;
      }
      .sql-col-desc {
        color: #aaa;
        font-size: 11px;
        white-space: normal;
        word-break: break-word;
      }
      .sql-error {
        color: #f55;
        margin-top: 4px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
